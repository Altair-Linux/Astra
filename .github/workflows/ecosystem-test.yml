name: Ecosystem Integration Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ecosystem-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Astra
        uses: actions/checkout@v4
        with:
          path: Astra

      - name: Checkout packages repository
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/packages
          path: packages

      - name: Checkout altair-repo repository
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/altair-repo
          path: altair-repo

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Astra/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Astra/**/Cargo.lock') }}-ecosystem-test
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Astra binary
        working-directory: Astra
        run: cargo build -p astra

      - name: Initialize test environment and keys
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .astra-test .astra-root
          mkdir -p .astra-test .astra-root altair-repo/unstable/packages

          Astra/target/debug/astra --data-dir .astra-test --root .astra-root init
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key generate
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key export -o altair-repo/keys/repo.pub
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key add repo altair-repo/keys/repo.pub

      - name: Build all packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for pkg in packages/*; do
            if [[ -d "$pkg" ]]; then
              Astra/target/debug/astra --data-dir .astra-test --root .astra-root build "$pkg" --output altair-repo/unstable/packages
            fi
          done

          count=$(find altair-repo/unstable/packages -maxdepth 1 -type f -name '*.astpkg' | wc -l)
          if [[ "$count" -eq 0 ]]; then
            echo "No packages were built"
            exit 1
          fi

      - name: Update unstable channel metadata
        run: Astra/target/debug/astra --data-dir .astra-test --root .astra-root repo update altair-repo/unstable

      - name: Start local repository server
        shell: bash
        run: |
          set -euo pipefail
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root serve-repo altair-repo/unstable --bind 127.0.0.1:18080 > .astra-test/repo-server.log 2>&1 &
          echo $! > .astra-test/repo-server.pid

          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/index.json > /dev/null; then
              echo "Repository server is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Repository server failed to start"
          cat .astra-test/repo-server.log || true
          exit 1

      - name: Run lifecycle commands
        shell: bash
        run: |
          set -euo pipefail
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root repo add unstable http://127.0.0.1:18080/
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root update
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root install nano
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root remove nano
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root upgrade

      - name: Stop local repository server
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .astra-test/repo-server.pid ]]; then
            kill "$(cat .astra-test/repo-server.pid)" || true
          fi
