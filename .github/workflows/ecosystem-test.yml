name: Ecosystem Integration Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ecosystem-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Astra
        uses: actions/checkout@v4
        with:
          path: Astra

      - name: Checkout packages repository
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/packages
          path: packages

      - name: Checkout altair-repo repository
        uses: actions/checkout@v4
        with:
          repository: Altair-Linux/altair-repo
          path: altair-repo

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Astra/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Astra/**/Cargo.lock') }}-ecosystem-test
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Astra binary
        working-directory: Astra
        run: cargo build -p astra

      - name: Initialize test environment and keys
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .astra-test .astra-root
          mkdir -p .astra-test .astra-root altair-repo/keys altair-repo/unstable/packages

          Astra/target/debug/astra --data-dir .astra-test --root .astra-root init
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key generate
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key export -o altair-repo/keys/repo.pub
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root key add repo altair-repo/keys/repo.pub

      - name: Build all packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          for pkg in packages/*; do
            if [[ -d "$pkg" ]]; then
              Astra/target/debug/astra --data-dir .astra-test --root .astra-root build "$pkg" --output altair-repo/unstable/packages
            fi
          done

          count=$(find altair-repo/unstable/packages -maxdepth 1 -type f -name '*.astpkg' | wc -l)
          if [[ "$count" -eq 0 ]]; then
            echo "No packages were built"
            exit 1
          fi

      - name: Generate unstable channel metadata
        shell: bash
        run: |
          set -euo pipefail

          pkgs_json="[]"
          shopt -s nullglob
          for file in altair-repo/unstable/packages/*.astpkg; do
            base=$(basename "$file")
            size=$(stat -c%s "$file")
            checksum=$(sha256sum "$file" | awk '{print $1}')

            recipe_dir=""
            for d in packages/*; do
              if [[ -f "$d/astra.pkg" ]]; then
                name=$(awk -F= '/^name=/{print $2}' "$d/astra.pkg" | tail -n1)
                version=$(awk -F= '/^version=/{print $2}' "$d/astra.pkg" | tail -n1)
                arch=$(awk -F= '/^architecture=/{print $2}' "$d/astra.pkg" | tail -n1)
                if [[ "$base" == "${name}-${version}-${arch}.astpkg" ]]; then
                  recipe_dir="$d"
                  break
                fi
              fi
            done

            if [[ -z "$recipe_dir" ]]; then
              continue
            fi

            name=$(awk -F= '/^name=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)
            version=$(awk -F= '/^version=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)
            arch=$(awk -F= '/^architecture=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)
            desc=$(awk -F= '/^description=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)
            maint=$(awk -F= '/^maintainer=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)
            license=$(awk -F= '/^license=/{print $2}' "$recipe_dir/astra.pkg" | tail -n1)

            entry=$(jq -n \
              --arg name "$name" \
              --arg version "$version" \
              --arg arch "$arch" \
              --arg desc "$desc" \
              --arg checksum "$checksum" \
              --arg filename "$base" \
              --argjson size "$size" \
              --arg license "$license" \
              --arg maintainer "$maint" \
              '{name:$name,version:$version,architecture:$arch,description:$desc,dependencies:[],conflicts:[],provides:[],checksum:$checksum,filename:$filename,size:$size,license:$license,maintainer:$maintainer}')

            pkgs_json=$(jq -c --argjson entry "$entry" '. + [$entry]' <<< "$pkgs_json")
          done

          jq -n \
            --arg name "unstable" \
            --arg description "Altair Linux package repository" \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson packages "$pkgs_json" \
            '{name:$name,description:$description,last_updated:$updated,packages:$packages}' \
            > altair-repo/unstable/index.json

      - name: Start local repository server
        shell: bash
        run: |
          set -euo pipefail
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root serve-repo altair-repo/unstable --bind 127.0.0.1:18080 > .astra-test/repo-server.log 2>&1 &
          echo $! > .astra-test/repo-server.pid

          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/index.json > /dev/null; then
              echo "Repository server is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Repository server failed to start"
          cat .astra-test/repo-server.log || true
          exit 1

      - name: Run lifecycle commands
        shell: bash
        run: |
          set -euo pipefail
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root repo add unstable http://127.0.0.1:18080/
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root update
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root install nano
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root remove nano
          Astra/target/debug/astra --data-dir .astra-test --root .astra-root upgrade

      - name: Stop local repository server
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .astra-test/repo-server.pid ]]; then
            kill "$(cat .astra-test/repo-server.pid)" || true
          fi
