name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        run: |
          git archive \
            --format=tar.gz \
            --prefix="astra-${{ steps.version.outputs.version }}/" \
            --output="astra-${{ steps.version.outputs.version }}.tar.gz" \
            HEAD

      - name: Compute SHA256
        id: sha256
        run: |
          echo "sha256=$(sha256sum astra-${{ steps.version.outputs.version }}.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Astra ${{ github.ref_name }}"
          body: |
            ## Astra ${{ github.ref_name }}

            ### Source tarball SHA256
            ```
            ${{ steps.sha256.outputs.sha256 }}  astra-${{ steps.version.outputs.version }}.tar.gz
            ```

            Use this SHA256 in `astra/Astrafile.yaml` in the `packages` repository:
            ```yaml
            source:
              url: "https://github.com/altair-linux/astra/archive/refs/tags/${{ github.ref_name }}.tar.gz"
              sha256: "${{ steps.sha256.outputs.sha256 }}"
            ```
          files: |
            astra-${{ steps.version.outputs.version }}.tar.gz
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
